version: '3.8'

services:
  # The PostgreSQL Database
  db:
    image: postgres:15-alpine
    container_name: uniglobe-postgres
    restart: always
    environment:
      POSTGRES_USER: saaifshuvo
      POSTGRES_DB: uniglobe_leads
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  # The MinIO Object Storage
  minio:
    image: minio/minio
    container_name: uniglobe-minio
    restart: always
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data

  # The Next.js App
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: uniglobe-next-app
    restart: always
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://saaifshuvo@db:5432/uniglobe_leads
      - MINIO_ENDPOINT=http://minio
      - MINIO_PORT=9000
      - MINIO_PUBLIC_URL=http://localhost:9000
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - db
      - minio

  # The Cloudflare Tunnel
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: uniglobe-cloudflared
    restart: always
    command: tunnel --config /etc/cloudflared/config.yml run
    volumes:
      - ../../../cloudflared:/etc/cloudflared
    depends_on:
      - app

  # Prisma Studio GUI
  prisma-studio:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: uniglobe-prisma-studio
    restart: unless-stopped
    command: npx prisma studio --hostname 0.0.0.0 --port 5555
    ports:
      - "5555:5555"
    environment:
      - DATABASE_URL=postgresql://saaifshuvo@db:5432/uniglobe_leads
    volumes:
      - .:/app
      - /app/node_modules
    depends_on:
      - db

volumes:
  pgdata:
  miniodata:
