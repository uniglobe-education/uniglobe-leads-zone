<style>
    :root {
        --primary-color: #0A369D;
        /* Deep blue */
        --primary-hover: #082977;
        --secondary-color: #F8FAFC;
        --text-dark: #1E293B;
        --text-light: #64748B;
        --border-color: #E2E8F0;
        --bg-color: #F1F5F9;
        --success-color: #10B981;
        --error-color: #EF4444;
        --card-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
    }

    * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
    }

    body {
        font-family: 'Inter', system-ui, -apple-system, sans-serif;
        background-color: var(--bg-color);
        color: var(--text-dark);
        line-height: 1.5;
        -webkit-font-smoothing: antialiased;
    }

    .app-container {
        max-width: 500px;
        margin: 0 auto;
        padding: 20px;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
    }

    /* Header */
    .header {
        text-align: center;
        margin-bottom: 24px;
    }

    .logo {
        font-size: 1.25rem;
        font-weight: 800;
        color: var(--primary-color);
        margin-bottom: 8px;
        letter-spacing: -0.5px;
    }

    .title {
        font-size: 1.5rem;
        font-weight: 700;
        margin-bottom: 4px;
    }

    .subtitle {
        color: var(--text-light);
        font-size: 0.95rem;
    }

    /* Progress */
    .progress-section {
        margin-bottom: 24px;
    }

    .step-text {
        text-align: center;
        font-size: 0.875rem;
        color: var(--text-light);
        margin-bottom: 8px;
        font-weight: 500;
    }

    .progress-bar-bg {
        background-color: var(--border-color);
        height: 6px;
        border-radius: 3px;
        overflow: hidden;
    }

    .progress-bar-fill {
        background-color: var(--primary-color);
        height: 100%;
        width: 0%;
        transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* Card */
    .card {
        background: white;
        border-radius: 16px;
        padding: 32px 24px;
        box-shadow: var(--card-shadow);
        flex-grow: 1;
        display: flex;
        flex-direction: column;
        justify-content: center;
        position: relative;
        overflow: hidden;
    }

    /* Loading */
    .loader-container {
        text-align: center;
        color: var(--text-light);
    }

    .spinner {
        width: 40px;
        height: 40px;
        margin: 0 auto 16px;
        border: 3px solid var(--border-color);
        border-top-color: var(--primary-color);
        border-radius: 50%;
        animation: spin 1s linear infinite;
    }

    @keyframes spin {
        to {
            transform: rotate(360deg);
        }
    }

    /* Question UI */
    .question-label {
        font-size: 1.25rem;
        font-weight: 600;
        margin-bottom: 8px;
        line-height: 1.4;
        color: var(--text-dark);
    }

    .help-text {
        font-size: 0.875rem;
        color: var(--text-light);
        margin-bottom: 24px;
    }

    .input-group {
        margin-bottom: 24px;
        margin-top: 24px;
    }

    /* Inputs */
    input[type="text"],
    input[type="tel"],
    input[type="email"],
    select,
    textarea {
        width: 100%;
        padding: 16px;
        font-size: 1rem;
        border: 1px solid var(--border-color);
        border-radius: 12px;
        background-color: var(--secondary-color);
        color: var(--text-dark);
        transition: all 0.2s;
        font-family: inherit;
        -webkit-appearance: none;
        appearance: none;
    }

    select {
        background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
        background-repeat: no-repeat;
        background-position: right 1rem center;
        background-size: 1em;
    }

    input:focus,
    select:focus,
    textarea:focus {
        outline: none;
        border-color: var(--primary-color);
        box-shadow: 0 0 0 3px rgba(10, 54, 157, 0.1);
        background-color: white;
    }

    textarea {
        resize: vertical;
        min-height: 100px;
    }

    /* MCQ Buttons */
    .mcq-group {
        display: flex;
        flex-direction: column;
        gap: 12px;
        margin-top: 24px;
    }

    .mcq-btn {
        padding: 16px 20px;
        text-align: left;
        background: white;
        border: 1px solid var(--border-color);
        border-radius: 12px;
        font-size: 1rem;
        font-weight: 500;
        color: var(--text-dark);
        cursor: pointer;
        transition: all 0.2s;
        display: flex;
        align-items: center;
    }

    .mcq-btn:hover {
        border-color: var(--primary-color);
        background-color: #F8FAFC;
    }

    .mcq-btn.selected {
        border-color: var(--primary-color);
        background-color: rgba(10, 54, 157, 0.05);
        box-shadow: 0 0 0 1px var(--primary-color);
    }

    /* Navigation */
    .navigation {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-top: 24px;
        gap: 12px;
    }

    .btn {
        padding: 14px 24px;
        font-size: 1rem;
        font-weight: 600;
        border-radius: 12px;
        cursor: pointer;
        border: none;
        transition: all 0.2s;
        text-align: center;
        text-decoration: none;
    }

    .btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
    }

    .btn-primary {
        background-color: var(--primary-color);
        color: white;
        flex-grow: 1;
    }

    .btn-primary:not(:disabled):hover {
        background-color: var(--primary-hover);
        transform: translateY(-1px);
    }

    .btn-secondary {
        background-color: #E2E8F0;
        color: var(--text-dark);
        min-width: 100px;
    }

    .btn-secondary:not(:disabled):hover {
        background-color: #CBD5E1;
    }

    .btn-block {
        display: block;
        width: 100%;
        margin-bottom: 12px;
        flex-grow: 0;
    }

    .action-buttons-vertical {
        margin-top: 24px;
        display: flex;
        flex-direction: column;
        gap: 12px;
    }

    /* Success Message */
    .success-message {
        text-align: center;
        padding: 20px 0;
    }

    .success-icon {
        width: 64px;
        height: 64px;
        background-color: rgba(16, 185, 129, 0.1);
        color: var(--success-color);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 24px;
    }

    .success-message h2 {
        margin-bottom: 12px;
        font-size: 1.5rem;
        color: var(--text-dark);
    }

    .success-message p {
        color: var(--text-light);
        margin-bottom: 32px;
    }

    /* Footer */
    .footer {
        text-align: center;
        margin-top: 32px;
        color: var(--text-light);
        font-size: 0.875rem;
    }

    .footer p {
        margin-bottom: 4px;
    }

    .footer a {
        color: var(--primary-color);
        text-decoration: none;
    }

    .footer a:hover {
        text-decoration: underline;
    }

    /* Animations */
    .fade-in {
        animation: fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    }

    @keyframes fadeIn {
        from {
            opacity: 0;
            transform: translateY(8px);
        }

        to {
            opacity: 1;
            transform: translateY(0);
        }
    }
</style>
